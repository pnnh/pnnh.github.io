{% if jekyll.environment == "production" and site.turnstile.enabled %}

<!-- Turnstile: 通过 onload 回调确保脚本加载后立即执行，container 由 JS 动态注入 body -->
<script>
    const _tsSitekey = '{{ site.turnstile.sitekey }}';

    function onTurnstileLoaded() {
        if (sessionStorage.getItem('turnstilePassed') === 'true') {
            console.log('Turnstile already passed in this session, skipping challenge');
            return;
        }
        const container = document.createElement('div');
        container.id = 'turnstile-container';
        /* 全页白色遮罩，Turnstile 组件居中显示 */
        container.style.position = 'fixed';
        container.style.top = '0';
        container.style.left = '0';
        container.style.width = '100vw';
        container.style.height = '100vh';
        container.style.backgroundColor = '#ffffff';
        container.style.display = 'flex';
        container.style.alignItems = 'center';
        container.style.justifyContent = 'center';
        container.style.zIndex = '999999';
        document.body.appendChild(container);

        const config = {
            sitekey: _tsSitekey,
            appearance: 'interaction-only',
            execution: 'execute',
            callback: function (token, preClearanceObtained) {
                if (preClearanceObtained) {
                    console.log('Pre-clearance cookie issued successfully');
                } else {
                    console.log('User completed challenge (non-pre-clearance)');
                }
                const el = document.getElementById('turnstile-container');
                if (el) el.remove();
                sessionStorage.setItem('turnstilePassed', 'true');
            },
            'error-callback': function (error) {
                console.error('Turnstile error:', error);
            },
            'timeout-callback': function () {
                console.warn('Turnstile timeout - may need user action');
            }
        };

        const widgetId = turnstile.render('#turnstile-container', config);

        /* execution=execute 模式需手动调用 execute() 才会触发 challenge */
        if (widgetId) {
            turnstile.execute(widgetId);
        } else {
            console.error('Failed to render Turnstile widget');
        }
    }
    /* 更可靠的加载处理 */
    if (window.turnstile) {
        onTurnstileLoaded();
    }
</script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit&onload=onTurnstileLoaded" async
    defer>
    </script>

{% endif %}
